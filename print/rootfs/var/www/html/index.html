<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HA-print</title>
<style>
:root { color-scheme: dark; }
body { font-family: ui-sans-serif, system-ui, sans-serif; background: #111827; color: #e5e7eb; margin: 0; padding: 2rem; }
h1 { margin-top: 0; font-size: 1.5rem; }
code { background: #1f2937; padding: 0.1em 0.4em; border-radius: 6px; }
.card { background: #1f2937; padding: 1rem 1.25rem; border-radius: 12px; max-width: 640px; margin-bottom: 1rem; }
.status { display: inline-block; padding: 0.1em 0.7em; border-radius: 999px; font-size: 0.85rem; }
.ok { background: #064e3b; color: #6ee7b7; }
.bad { background: #7f1d1d; color: #fca5a5; }
.muted { color: #9ca3af; font-size: 0.9rem; }
button { background: #0047AB; color: white; border: 0; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
button:hover { background: #1e40af; }
</style>
</head>
<body>
<h1>🖨 HA-print</h1>
<div class="card">
  <div>Printer: <code id="host">…</code></div>
  <div style="margin-top:0.5rem">Reachable: <span id="status" class="status">…</span></div>
  <div class="muted" style="margin-top:1rem">
    No UI here — this add-on is called by HA-stock, HA-recipes, or HA service calls
    (<code>ha_print.shopping_list</code>, <code>ha_print.recipe</code>).
  </div>
</div>
<script>
async function refresh() {
  try {
    const r = await fetch('api/health');
    const j = await r.json();
    document.getElementById('host').textContent = `${j.printer_host || '(unset)'}:${j.printer_port}`;
    const s = document.getElementById('status');
    if (j.printer_reachable) { s.textContent = 'yes'; s.className = 'status ok'; }
    else { s.textContent = 'no'; s.className = 'status bad'; }
  } catch (e) {
    document.getElementById('status').textContent = 'error';
    document.getElementById('status').className = 'status bad';
  }
}
refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
